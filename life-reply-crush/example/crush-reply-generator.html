<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天回复生成器 - Crush版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
        .typing-effect { animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen gradient-bg">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">💬 聊天回复生成器</h1>
            <p class="text-white/80 text-lg">输入对方说的话，AI生成多种风格的回复</p>
        </div>

        <!-- 
            =============================================
            以下公共部分参考自 common-model-struct/resources/base.html
            如需修改公共部分，请同步修改 base.html
            =============================================
        -->
        <!-- ========== 公共部分: API Key 设置 ========== -->
        <div class="bg-white/10 backdrop-blur rounded-xl p-4 mb-6">
            <div class="flex gap-2 mb-3">
                <button onclick="selectPlatform('deepseek')" id="btn-deepseek" class="platform-btn px-4 py-2 rounded-lg bg-white/20 text-white text-sm transition-all">DeepSeek</button>
                <button onclick="selectPlatform('siliconflow')" id="btn-siliconflow" class="platform-btn px-4 py-2 rounded-lg bg-white/10 text-white/60 text-sm transition-all hover:bg-white/20">硅基流动</button>
            </div>
            <div id="modelSelector" class="flex flex-wrap gap-2 mb-3"></div>
            <div class="flex flex-col md:flex-row gap-3 items-center">
                <input type="password" id="apiKey" placeholder="输入 API Key" class="flex-1 px-4 py-2 text-sm border border-white/30 bg-white/20 text-white placeholder-white/50 rounded-lg focus:outline-none focus:border-white">
                <button onclick="saveApiKey()" class="px-4 py-2 bg-white/20 hover:bg-white/30 text-white text-sm rounded-lg transition-all">保存</button>
            </div>
            <div class="flex items-center gap-2 mt-2">
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span class="text-white/50 text-xs">仅保存在本地浏览器，不上传服务器</span>
            </div>
            <p id="apiKeyHelp" class="text-white/60 text-xs mt-2">获取 API Key: <a href="https://platform.deepseek.com/" target="_blank" class="underline">https://platform.deepseek.com/</a></p>
            <p id="pricingInfo" class="text-white/50 text-xs mt-1">定价: 输入 $0.28/M, 输出 $0.42/M <a id="pricingUrl" href="https://api-docs.deepseek.com/quick_start/pricing" target="_blank" class="underline">(来源)</a></p>
            <p id="estimateInfo" class="text-white/40 text-xs mt-1">预计每次: 约 $0.0005 (~¥0.004)</p>
        </div>

        <!-- ========== 业务特定部分: 输入区 ========== -->
        <div class="bg-white rounded-2xl shadow-2xl p-6 mb-8">
            <label class="block text-gray-700 font-medium mb-3 text-lg">对方说了什么？</label>
            <div class="relative">
                <input type="text" id="inputText" placeholder="我要去洗澡了" class="w-full px-5 py-4 text-lg border-2 border-gray-200 rounded-xl focus:border-purple-500 focus:outline-none transition-all">
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 typing-effect">|</span>
            </div>
            <button id="generateBtn" onclick="generateReplies()" class="w-full mt-4 bg-gradient-to-r from-purple-600 to-pink-500 text-white py-4 rounded-xl font-semibold text-lg hover:shadow-lg hover:scale-[1.02] transition-all duration-200 flex flex-col items-center justify-center gap-1">
                <span id="btnMainText">✨ AI 生成回复</span>
                <span id="btnSubText" class="text-xs font-normal opacity-75"></span>
            </button>
        </div>

        <!-- ========== 公共部分: 结果展示 ========== -->
        <div id="modelInfo" class="text-center text-white/50 text-sm mb-4 hidden">使用平台: <span id="platformDisplay"></span> | 模型: <span id="modelDisplay"></span></div>
        <div id="repliesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="tokenUsage" class="bg-white/10 backdrop-blur rounded-lg px-4 py-2 text-center text-white/60 text-sm col-span-2 hidden">
                本次消耗: <span id="tokenCount" class="font-medium">-</span> tokens (<span id="tokenCost">约 ¥0.00</span>)
            </div>
        </div>
        <div id="emptyState" class="text-center text-white/70 py-12">
            <div class="text-6xl mb-4">💭</div>
            <p class="text-xl">输入对方说的话，开启你的社交自由</p>
        </div>

        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none">已复制到剪贴板！</div>
    </div>

    <!-- ========== 公共部分: 引入公共JS ========== -->
    <script src="../../common-model-struct/resources/common.js"></script>
    
    <!-- ========== 业务特定部分: 业务逻辑 ========== -->
    <script>
        // 业务特定 Prompt
        const SYSTEM_PROMPT = `你是一个情商大师，专门帮用户用幽默撩人、有情绪张力的方式回复 crush 的消息。

核心目标：回复要有情绪价值——能让对方笑、让对方脸红、让对方想继续聊。

核心方向（这些是底线和方向，不是限制）：
1. 上位者姿态：回复要体现出"我是主动方，我是在引导这段互动"
2. 轻占有感：用暗示的方式，比如"从小就没老婆的"暗示对方愿意做你老婆
3. 避免备胎感：不暴露过度等待或情绪依赖
4. 拒绝土味和刻意撩：不用"小傻瓜""坏蛋"这类词
5. 有钩子但不说破：创造一个对方回来后可以自然接住的小情境

规则：每次生成 6-8 个回复，1-2句话，必须让她想接话`;

        // 颜色配置
        const CARD_COLORS = [
            'from-orange-400 to-pink-500',
            'from-pink-400 to-rose-500',
            'from-blue-400 to-indigo-500',
            'from-yellow-400 to-orange-500',
            'from-green-400 to-teal-500',
            'from-red-500 to-purple-600',
            'from-purple-400 to-indigo-600',
            'from-cyan-400 to-blue-500'
        ];

        // 事件绑定
        document.getElementById('inputText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateReplies();
        });

        // 业务函数
        async function generateReplies() {
            let input = document.getElementById('inputText').value.trim();
            if (!input) input = document.getElementById('inputText').placeholder;
            
            const apiKey = getApiKey();
            if (!apiKey) {
                alert('请先输入 ' + PLATFORMS[currentPlatform].name + ' API Key');
                document.getElementById('apiKey').focus();
                return;
            }
            
            if (startGenerating()) return;
            
            const container = document.getElementById('repliesContainer');
            showLoadingSkeleton(container);

            try {
                const response = await fetch(PLATFORMS[currentPlatform].endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            { role: 'user', content: `crush：${input}\n\n请生成6-8个不同的回复选项，每个回复一行，格式为：类型: 回复内容` }
                        ],
                        temperature: 0.9
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    const errorMsg = data.error?.message || data.message || JSON.stringify(data);
                    throw new Error(`请求失败 (${response.status}): ${errorMsg}`);
                }
                
                updateTokenUsage(data);
                renderAIReplies(data.choices[0].message.content);
                
            } catch (error) {
                showErrorCard(container, error.message);
            } finally {
                finishGenerating();
            }
        }

        function renderAIReplies(content) {
            const container = document.getElementById('repliesContainer');
            container.innerHTML = '';
            
            const lines = content.split('\n').filter(line => line.trim());
            let replies = [];
            
            lines.forEach((line) => {
                let match;
                const trimmed = line.trim();
                
                match = trimmed.match(/^([^：:\-【】]+)[：:\-]\s*(.+)$/);
                if (match && match[2].length > 2) {
                    replies.push({ type: match[1].trim(), content: match[2].trim() });
                    return;
                }
                
                match = trimmed.match(/^【(.+?)】\s*(.+)$/);
                if (match && match[2].length > 2) {
                    replies.push({ type: match[1].trim(), content: match[2].trim() });
                    return;
                }
                
                if (trimmed.length >= 4 && trimmed.length <= 50 && !trimmed.includes('回复') && !trimmed.includes('以下') && !trimmed.includes('生成')) {
                    replies.push({ type: '选项', content: trimmed });
                    return;
                }
            });
            
            if (replies.length === 0) {
                const possibleReplies = lines.filter(l => l.length > 5 && l.length < 100);
                possibleReplies.forEach((text, i) => {
                    replies.push({ type: `选项${i+1}`, content: text.trim() });
                });
            }
            
            if (replies.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-xl p-6 col-span-2"><p class="text-gray-700 text-lg">${content}</p></div>`;
                return;
            }
            
            replies.forEach((reply, index) => {
                const card = document.createElement('div');
                card.className = `bg-gradient-to-br ${CARD_COLORS[index % CARD_COLORS.length]} rounded-xl p-5 card-hover transition-all duration-300 fade-in cursor-pointer`;
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="flex items-center mb-3"><span class="text-white font-semibold text-lg">${reply.type}</span></div>
                    <p class="text-white/95 text-lg leading-relaxed mb-4">"${reply.content}"</p>
                    <button class="w-full bg-white/20 hover:bg-white/30 text-white py-2 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 active:scale-95">
                        复制回复
                    </button>
                `;
                
                card.querySelector('button').addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(reply.content);
                });

                container.appendChild(card);
            });
        }

        // 初始化
        window.addEventListener('load', () => {
            initCommonUI();
        });
    </script>
</body>
</html>
